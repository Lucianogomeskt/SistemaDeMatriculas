<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Matrículas - Java & Oracle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container mt-5">
    <div class="card mb-5 header-block">
        <div class="card-body text-center">
            <h1 class="display-4">Gerenciador de Matrículas</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="card p-4">
                <h4 class="mb-3">Nova Matrícula</h4>
                <form action="/cadastrar" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome do Aluno</label>
                        <input type="text" name="nome" class="form-control" placeholder="Digite seu nome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CPF</label>
                        <input type="text" name="cpf" class="form-control" maxlength="11" minlength="11" placeholder="Digite seu CPF" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Curso</label>
                        <select name="nomeCurso" class="form-select" required>
                            <option value="" selected disabled>Selecione um curso...</option>
                            <option value="Java">Java</option>
                            <option value="Banco de Dados">Banco de Dados</option>
                            <option value="Python">Python</option>
                            <option value="JavaScript">JavaScript</option>
                        </select>
                    </div>
                    <input type="hidden" name="cargaHoraria" value="40">

                    <button type="submit" class="btn btn-primary w-100">Matricular Aluno</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4">
                <h4 class="mb-3">Alunos Matriculados</h4>
                <div class="table-responsive">
                    <table class="table table-striped table-hover mt-2">
                        <thead>
                        <tr>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Curso</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>Ricardo</td>
                            <td>12345678901</td>
                            <td>Java</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
